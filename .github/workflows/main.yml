name: Check Web Traffic
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Tools
        run: |
          pip install playwright
          playwright install chromium
      - name: Eksekusi Predator
        run: python predator.py
        
